name: Deploy to AWS S3 and Invalidate CloudFront

on:
  push:
    branches:
      - main # Or your default branch (e.g., master)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use your project's node version

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1 # Mumbai Region

      - name: Deploy to S3
        # Syncs the dist folder with your S3 bucket.
        # --delete removes files in the bucket that are no longer in the dist folder.
        run: aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET }} --delete

      # (Optional) If you have CloudFront set up, uncomment the next block to automatically clear the cache
      # - name: Invalidate CloudFront
      #   run: aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_ID }} --paths "/*"
